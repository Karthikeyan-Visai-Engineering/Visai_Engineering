<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Visai Energy – Innovative Engineering Services</title>

    <!-- SEO Tags -->
    <meta name="description" content="Visai Energy offers structural, mechanical, and electrical engineering solutions across Oil & Gas, Power, and Infrastructure sectors in India and Canada." />
    <meta name="keywords" content="Visai Energy, Engineering, Oil and Gas, Mechanical, Civil, Electrical, Canada, India, Power Plant Design, BIM, Detailed Engineering" />
    <meta name="author" content="Visai Energy" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.visaienergy.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Visai Energy – Engineering the Future" />
    <meta property="og:description" content="We provide cutting-edge engineering design and services across oil, gas, structural and sustainable sectors." />
    <meta property="og:image" content="https://www.visaienergy.com/logo.png" />
    <meta property="og:url" content="https://www.visaienergy.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Visai Energy – Engineering Expertise" />
    <meta name="twitter:description" content="Explore Visai Energy’s innovative approach to oil & gas, structural, civil, electrical, and process engineering." />
    <meta name="twitter:image" content="https://www.visaienergy.com/logo.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Visai Energy",
        "url": "https://www.visaienergy.com",
        "logo": "https://www.visaienergy.com/logo.png",
        "sameAs": [
          "https://www.linkedin.com/company/visaienergy",
          "https://www.facebook.com/visaienergy"
        ],
        "description": "Visai Energy is a design and engineering company that provides structural, mechanical, and process engineering solutions across India and Canada.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "500 - 4th Avenue SW, Suite 2500",
          "addressLocality": "Calgary",
          "addressRegion": "AB",
          "postalCode": "T2P 2V6",
          "addressCountry": "Canada"
        }
      }
    </script>

    <!-- Favicon -->
    <link rel="icon" href="/logo.ico" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config for Custom Fonts -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
              anton: ['Anton', 'sans-serif'],
              hand: ['"Edu SA Hand"', 'cursive'],
              poppins: ['Poppins', 'sans-serif']
            }
          }
        }
      };
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Anton&family=Edu+SA+Hand:wght@400..700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Manifest for PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E3A8A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>

  <body class="bg-white font-poppins text-[#1e325c]">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
     <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <!-- Your App Scripts -->
    <script src="/path/to/your/scripts.js"></script>
  </body>
</html>
<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />

</form>
